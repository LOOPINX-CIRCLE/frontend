name: text_code
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  device_preview: ^1.3.1
  flutter:
    sdk: flutter
  geocoding: ^4.0.0
  get: ^4.7.2
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.12.3
  http: ^1.5.0
  intl: ^0.20.2
  image_picker: ^1.2.0
  liquid_glass_renderer: ^0.1.1-dev.10
  share_plus: ^11.1.0
  url_launcher: ^6.3.2
  country_picker: ^2.0.26
  pinput: ^5.0.0
  dotted_border: ^2.1.0
  video_player: ^2.9.2
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.0.2
  shared_preferences: ^2.0.0
  onesignal_flutter: ^5.4.1
  webview_flutter: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
     - assets/images/
     - assets/icons/
     - assets/images/button/
     - assets/video/
     - .env
  fonts:
    - family: ClashDisplay
      fonts:
        - asset: assets/fonts/ClashDisplay-Extralight.otf
          weight: 200
        - asset: assets/fonts/ClashDisplay-Light.otf
          weight: 300
        - asset: assets/fonts/ClashDisplay-Regular.otf
          weight: 400
        - asset: assets/fonts/ClashDisplay-Medium.otf
          weight: 500
        - asset: assets/fonts/ClashDisplay-Semibold.otf
          weight: 600
        - asset: assets/fonts/ClashDisplay-Bold.otf
          weight: 700
    - family: Ballet
      fonts:
        - asset: assets/fonts/Ballet_24pt-Regular.ttf
          weight: 400


